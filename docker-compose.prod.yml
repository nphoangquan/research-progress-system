# Production — chỉ chạy file này (không thêm -f docker-compose.yml).
#
# docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Build/tag version trước khi push registry, ví dụ:
#   docker compose -f docker-compose.prod.yml build backend web
#   docker tag nphoangquan/research-progress-backend:latest nphoangquan/research-progress-backend:1.0.0
#   docker tag nphoangquan/research-progress-web:latest nphoangquan/research-progress-web:1.0.0

services:
  db:
    image: pgvector/pgvector:pg16
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\""]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    mem_limit: 512m
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: nphoangquan/research-progress-backend:1.0.0
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: always
    mem_limit: 1g
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: nphoangquan/research-progress-web:1.0.0
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    mem_limit: 256m
    cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  postgres_data:
  backend_uploads:
  backend_logs:
