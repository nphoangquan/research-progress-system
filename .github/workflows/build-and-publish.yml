# Build kiểm tra (backend + frontend) trên runner, rồi build & push image lên Docker Hub.
#
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (hub.docker.com → Security).
# Variable (tuỳ chọn): VITE_API_URL — build frontend image; mặc định /api.

name: Build & publish

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_BACKEND: research-progress-backend
  IMAGE_WEB: research-progress-web

jobs:
  backend:
    name: Backend (Prisma + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Prisma generate
        run: npx prisma generate

      - name: TypeScript build
        run: npm run build

  frontend:
    name: Frontend (Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  docker-publish:
    name: Docker Hub (build & push)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Backend — build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:sha-${{ github.sha }}

      - name: Web — build & push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || '/api' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_WEB }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_WEB }}:sha-${{ github.sha }}
